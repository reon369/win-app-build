<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト自動生成ツール</title>
<style>
  body {
    font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    margin: 0;
    padding: 24px;
    background: #f7f6f3;
    color: #222;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 16px;
  }
  h2 {
    font-size: 16px;
    font-weight: 500;
    margin: 0 0 8px;
  }
  .container {
    max-width: 1100px;
    margin: 0 auto;
  }
  .panel {
    background: #fff;
    border: 1px solid #e0ddd6;
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .staff-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .staff-row input[type="text"] {
    width: 100px;
    padding: 4px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  .staff-row label {
    font-size: 13px;
    color: #555;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .staff-row button {
    border: none;
    background: #eee;
    border-radius: 4px;
    width: 24px;
    height: 24px;
    cursor: pointer;
  }
  button.main-btn {
    border: 1px solid #ccc;
    background: #fff;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 14px;
    cursor: pointer;
  }
  button.main-btn:hover {
    background: #f0f0f0;
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .slider-row label {
    min-width: 130px;
    font-size: 14px;
    color: #555;
  }
  .slider-row input[type="range"] {
    flex: 1;
  }
  .slider-out {
    min-width: 50px;
    font-size: 14px;
    font-weight: 500;
  }
  table {
    border-collapse: collapse;
    font-size: 12px;
    white-space: nowrap;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 4px 6px;
    text-align: center;
    min-width: 28px;
  }
  th {
    background: #eee;
    font-weight: 500;
  }
  td.name, th.name {
    position: sticky;
    left: 0;
    background: #f5f5f5;
    font-weight: 500;
    text-align: left;
    min-width: 70px;
  }
  .table-wrap {
    overflow-x: auto;
  }
  .warning {
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
  }
  .warning.ok {
    background: #e6f4ea;
    color: #1e6b3a;
  }
  .warning.bad {
    background: #fdecea;
    color: #a33;
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
  }
  .summary-card {
    background: #f5f5f5;
    border-radius: 6px;
    padding: 10px 12px;
  }
  .summary-card .label {
    font-size: 13px;
    color: #666;
    margin-bottom: 4px;
  }
  .summary-card .value {
    font-size: 16px;
    font-weight: 500;
  }
  .summary-card .sub {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }
  .cell-夜 { background: #cfe8ff; }
  .cell-明 { background: #fff3cd; }
  .cell-休 { background: #e8e8e8; }
  .cell-友 { background: #d6f5e3; }
  .cell-日 { background: #f3e8fd; }
  .cell-sun { background: #fde7e7; color: #a33; }
  .cell-sat { background: #e7f0fd; color: #345; }
</style>
</head>
<body>
<div class="container">
  <h1>シフト自動生成ツール(試作版)</h1>

  <div class="panel">
    <h2>スタッフ設定</h2>
    <div id="staff-list"></div>
    <button class="main-btn" id="add-staff" style="margin-top:8px;">＋ スタッフを追加</button>
  </div>

  <div class="panel">
    <h2>対象月</h2>
    <div class="slider-row">
      <label>年</label>
      <input type="number" id="target-year" value="2026" min="2000" max="2100" style="width:80px;">
      <label style="min-width:auto; margin-left:12px;">月</label>
      <input type="number" id="target-month" value="6" min="1" max="12" style="width:60px;">
    </div>
  </div>

  <div class="panel">
    <h2>設定</h2>
    <div class="slider-row">
      <label>夜勤の間隔(目安)</label>
      <input type="range" min="2" max="10" step="1" value="6" id="min-interval">
      <span class="slider-out" id="min-interval-out">6 日</span>
    </div>
    <div class="slider-row">
      <label>連勤の上限</label>
      <input type="range" min="3" max="6" step="1" value="4" id="max-consecutive">
      <span class="slider-out" id="max-consecutive-out">4 日</span>
    </div>
  </div>

  <div style="margin-bottom: 16px;">
    <button class="main-btn" id="generate-btn">シフトを生成</button>
    <button class="main-btn" id="export-btn">CSVをダウンロード</button>
  </div>

  <div id="warnings"></div>

  <div id="result-wrap" style="display:none;">
    <div class="panel">
      <h2 id="result-title">生成結果</h2>
      <div class="table-wrap">
        <table id="result-table"></table>
      </div>
    </div>
    <div class="panel">
      <h2>集計</h2>
      <div class="summary-grid" id="summary-grid"></div>
    </div>
  </div>
</div>

<script>
let DAYS = 30;

function getDaysInMonth(year, month) {
  return new Date(year, month, 0).getDate();
}
function getWeekday(year, month, day) {
  // 0=Sun, 6=Sat
  return new Date(year, month - 1, day).getDay();
}
const WEEKDAY_LABELS = ['日', '月', '火', '水', '木', '金', '土'];
const CORE_SHIFTS = {
  "早": "早番 6:45-15:45",
  "B": "B 7:30-16:30",
  "C": "C 8:00-17:00",
  "F": "F 10:00-19:00",
  "P": "P 12:00-21:00"
};
const SUPPORT_SHIFTS = { "友A": "友A応援", "友P": "友P応援" };
const AKE = "明";
const YASUMI = "休";
const NICHI_SHIFT_CODE = "日";
const MAX_OFF_DAYS = 9; // 休みの上限(これを超える分は「日」に変換)

let staffData = [
  { name: "山田", canNight: true, years: 5 },
  { name: "佐藤", canNight: true, years: 3 },
  { name: "鈴木", canNight: true, years: 1 },
  { name: "田中", canNight: true, years: 7 },
  { name: "伊藤", canNight: true, years: 2 },
  { name: "渡辺", canNight: true, years: 4 },
  { name: "高橋", canNight: true, years: 1 },
  { name: "中村", canNight: true, years: 6 },
  { name: "小林", canNight: true, years: 2 },
  { name: "加藤", canNight: true, years: 8 }
];

const JUNIOR_THRESHOLD = 2; // この年数以下を「若手」とみなす

let lastSchedule = null;
let lastStaff = null;

function renderStaffList() {
  const list = document.getElementById('staff-list');
  list.innerHTML = '';
  staffData.forEach((s, idx) => {
    const row = document.createElement('div');
    row.className = 'staff-row';

    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.value = s.name;
    nameInput.addEventListener('input', e => { staffData[idx].name = e.target.value; });

    const yearsInput = document.createElement('input');
    yearsInput.type = 'number';
    yearsInput.min = '0';
    yearsInput.max = '50';
    yearsInput.value = s.years;
    yearsInput.style.width = '54px';
    yearsInput.title = '勤続年数';
    yearsInput.addEventListener('input', e => { staffData[idx].years = parseInt(e.target.value, 10) || 0; });

    const yearsLabel = document.createElement('span');
    yearsLabel.textContent = '年';
    yearsLabel.style.fontSize = '13px';
    yearsLabel.style.color = '#555';

    const label = document.createElement('label');
    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = s.canNight;
    checkbox.addEventListener('change', e => { staffData[idx].canNight = e.target.checked; });
    label.appendChild(checkbox);
    label.appendChild(document.createTextNode('夜勤可'));

    const removeBtn = document.createElement('button');
    removeBtn.textContent = '×';
    removeBtn.addEventListener('click', () => {
      staffData.splice(idx, 1);
      renderStaffList();
    });

    row.appendChild(nameInput);
    row.appendChild(yearsInput);
    row.appendChild(yearsLabel);
    row.appendChild(label);
    row.appendChild(removeBtn);
    list.appendChild(row);
  });
}

document.getElementById('add-staff').addEventListener('click', () => {
  staffData.push({ name: '新規' + (staffData.length + 1), canNight: true, years: 1 });
  renderStaffList();
});

document.getElementById('min-interval').addEventListener('input', e => {
  document.getElementById('min-interval-out').textContent = e.target.value + ' 日';
});
document.getElementById('max-consecutive').addEventListener('input', e => {
  document.getElementById('max-consecutive-out').textContent = e.target.value + ' 日';
});

function isResting(code) {
  return code === YASUMI || code === AKE;
}

function hasTooManyConsecutive(schedule, name, day, maxConsecutive) {
  let count = 0;
  for (let d = day - 1; d >= Math.max(1, day - maxConsecutive); d--) {
    const code = schedule[name][d];
    if (code === '') continue;
    if (isResting(code)) break;
    count++;
  }
  return count >= maxConsecutive;
}

function nightTotal(schedule, name) {
  let c = 0;
  for (let d = 1; d <= DAYS; d++) if (schedule[name][d] === '夜') c++;
  return c;
}

function generateSchedule() {
  const targetYear = parseInt(document.getElementById('target-year').value, 10);
  const targetMonth = parseInt(document.getElementById('target-month').value, 10);
  DAYS = getDaysInMonth(targetYear, targetMonth);

  const minInterval = parseInt(document.getElementById('min-interval').value, 10);
  const maxConsecutive = parseInt(document.getElementById('max-consecutive').value, 10);
  const schedule = {};
  staffData.forEach(s => { schedule[s.name] = Array(DAYS + 1).fill(''); });

  // 夜勤割り当て(逆算方式)
  const nightCandidates = staffData.filter(s => s.canNight);
  const n = nightCandidates.length;
  const base = n ? Math.floor(DAYS / n) : 0;
  const remainder = n ? DAYS % n : 0;
  const target = {};
  nightCandidates.forEach((s, i) => {
    target[s.name] = base + (i < remainder ? 1 : 0);
  });

  const nightDays = {};
  const nightCount = {};
  nightCandidates.forEach(s => { nightDays[s.name] = []; nightCount[s.name] = 0; });

  for (let day = 1; day <= DAYS; day++) {
    let candidates = [];
    let fallback = [];
    for (const s of nightCandidates) {
      if (schedule[s.name][day] !== '') continue;
      if (hasTooManyConsecutive(schedule, s.name, day, maxConsecutive)) continue;
      const last = nightDays[s.name].length ? nightDays[s.name][nightDays[s.name].length - 1] : null;
      if (last !== null && (day - last) < minInterval) {
        fallback.push(s);
      } else {
        candidates.push(s);
      }
    }
    let pool = candidates.length ? candidates : fallback;
    if (!pool.length) continue;

    pool.sort((a, b) => {
      const shortfallA = target[a.name] - nightCount[a.name];
      const shortfallB = target[b.name] - nightCount[b.name];
      if (shortfallA !== shortfallB) return shortfallB - shortfallA;
      const la = nightDays[a.name].length ? nightDays[a.name][nightDays[a.name].length - 1] : -999;
      const lb = nightDays[b.name].length ? nightDays[b.name][nightDays[b.name].length - 1] : -999;
      const ia = day - la, ib = day - lb;
      if (ib !== ia) return ib - ia;
      return Math.random() - 0.5;
    });
    const chosen = pool[0];
    schedule[chosen.name][day] = '夜';
    nightCount[chosen.name]++;
    nightDays[chosen.name].push(day);
    if (day + 1 <= DAYS) schedule[chosen.name][day + 1] = AKE;
    if (day + 2 <= DAYS) schedule[chosen.name][day + 2] = YASUMI;
  }

  // 日勤割り当て
  for (let day = 1; day <= DAYS; day++) {
    for (const s of staffData) {
      if (schedule[s.name][day] === '' && hasTooManyConsecutive(schedule, s.name, day, maxConsecutive)) {
        schedule[s.name][day] = YASUMI;
      }
    }

    let free = staffData.filter(s => schedule[s.name][day] === '');
    for (let i = free.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [free[i], free[j]] = [free[j], free[i]];
    }

    const coreKeys = Object.keys(CORE_SHIFTS);
    for (let i = coreKeys.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [coreKeys[i], coreKeys[j]] = [coreKeys[j], coreKeys[i]];
    }
    coreKeys.forEach(code => {
      if (!free.length) return;

      // 前日も同じシフトだった人を後回しにする(連続シフトを避ける)
      let idx = -1;
      for (let i = free.length - 1; i >= 0; i--) {
        if (schedule[free[i].name][day - 1] !== code) {
          idx = i;
          break;
        }
      }
      if (idx === -1) idx = free.length - 1; // 全員前日同じシフトなら仕方なく選ぶ

      const chosen = free.splice(idx, 1)[0];
      schedule[chosen.name][day] = code;
    });

    if (day % 2 === 0) {
      const supportKeys = Object.keys(SUPPORT_SHIFTS);
      for (let i = supportKeys.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [supportKeys[i], supportKeys[j]] = [supportKeys[j], supportKeys[i]];
      }
      supportKeys.forEach(code => {
        if (!free.length) return;

        let idx = -1;
        for (let i = free.length - 1; i >= 0; i--) {
          if (schedule[free[i].name][day - 1] !== code) {
            idx = i;
            break;
          }
        }
        if (idx === -1) idx = free.length - 1;

        const chosen = free.splice(idx, 1)[0];
        schedule[chosen.name][day] = code;
      });
    }

    free.forEach(s => { schedule[s.name][day] = YASUMI; });
  }

  // 連勤上限違反の修正
  staffData.forEach(s => {
    const name = s.name;
    let run = 0;
    for (let day = 1; day <= DAYS; day++) {
      const code = schedule[name][day];
      if (isResting(code)) { run = 0; continue; }
      run++;
      if (run > maxConsecutive) {
        const oldCode = code;
        schedule[name][day] = YASUMI;
        run = 0;

        if (CORE_SHIFTS[oldCode] || SUPPORT_SHIFTS[oldCode]) {
          for (const other of staffData) {
            if (other.name === name) continue;
            if (schedule[other.name][day] === YASUMI && !hasTooManyConsecutive(schedule, other.name, day, maxConsecutive)) {
              schedule[other.name][day] = oldCode;
              break;
            }
          }
        } else if (oldCode === '夜') {
          let cands = staffData.filter(o =>
            o.name !== name && o.canNight &&
            schedule[o.name][day] === YASUMI &&
            !hasTooManyConsecutive(schedule, o.name, day, maxConsecutive)
          );
          if (cands.length) {
            cands.sort((a, b) => {
              const diff = nightTotal(schedule, a.name) - nightTotal(schedule, b.name);
              if (diff !== 0) return diff;
              return Math.random() - 0.5;
            });
            const oname = cands[0].name;
            schedule[oname][day] = '夜';
            if (day + 1 <= DAYS && schedule[name][day + 1] === AKE) {
              schedule[name][day + 1] = YASUMI;
              if (schedule[oname][day + 1] === YASUMI) schedule[oname][day + 1] = AKE;
            }
          }
        }
      }
    }
  });

  // 休みの総数をできるだけ均等にする
  function offCount(name) {
    let c = 0;
    for (let d = 1; d <= DAYS; d++) if (schedule[name][d] === YASUMI) c++;
    return c;
  }

  for (let iter = 0; iter < staffData.length * DAYS; iter++) {
    const counts = staffData.map(s => ({ name: s.name, count: offCount(s.name) }));
    counts.sort((a, b) => b.count - a.count);
    const most = counts[0];
    const least = counts[counts.length - 1];

    if (most.count - least.count < 2) break;

    let moved = false;
    for (let day = 1; day <= DAYS; day++) {
      if (schedule[most.name][day] !== YASUMI) continue;
      const leastCode = schedule[least.name][day];
      if (!CORE_SHIFTS[leastCode]) continue;

      schedule[most.name][day] = leastCode;
      schedule[least.name][day] = YASUMI;

      let ok = true;
      if (hasTooManyConsecutive(schedule, most.name, day, maxConsecutive)) ok = false;
      if (ok && day - 1 >= 1 && schedule[most.name][day - 1] === leastCode) ok = false;
      if (ok && day + 1 <= DAYS && schedule[most.name][day + 1] === leastCode) ok = false;

      if (ok) {
        moved = true;
        break;
      } else {
        schedule[most.name][day] = YASUMI;
        schedule[least.name][day] = leastCode;
      }
    }
    if (!moved) break;
  }

  // 3連休以上を、休み総数を変えずに分散させる
  const MAX_OFF_STREAK = 2;
  for (const s of staffData) {
    const nameA = s.name;
    let run = 0;
    for (let day = 1; day <= DAYS; day++) {
      if (schedule[nameA][day] === YASUMI) run++; else run = 0;
      if (run <= MAX_OFF_STREAK) continue;

      const dayA = day;
      let found = false;

      for (const other of staffData) {
        const nameB = other.name;
        if (nameB === nameA) continue;
        if (!CORE_SHIFTS[schedule[nameB][dayA]]) continue;
        const codeA = schedule[nameB][dayA];

        for (let dayB = 1; dayB <= DAYS; dayB++) {
          if (dayB === dayA) continue;
          if (schedule[nameB][dayB] !== YASUMI) continue;
          const prevOff = (dayB - 1 >= 1 && schedule[nameB][dayB - 1] === YASUMI);
          const nextOff = (dayB + 1 <= DAYS && schedule[nameB][dayB + 1] === YASUMI);
          if (prevOff || nextOff) continue;
          if (!CORE_SHIFTS[schedule[nameA][dayB]]) continue;
          const codeB = schedule[nameA][dayB];

          schedule[nameA][dayA] = codeA;
          schedule[nameB][dayA] = YASUMI;
          schedule[nameA][dayB] = YASUMI;
          schedule[nameB][dayB] = codeB;

          let ok = true;
          for (const [nm, dy, cd] of [[nameA, dayA, codeA], [nameB, dayB, codeB]]) {
            if (hasTooManyConsecutive(schedule, nm, dy, maxConsecutive)) { ok = false; break; }
            if (dy - 1 >= 1 && schedule[nm][dy - 1] === cd) { ok = false; break; }
            if (dy + 1 <= DAYS && schedule[nm][dy + 1] === cd) { ok = false; break; }
          }

          if (ok) {
            // Bのday_aが新たに3連休以上を作らないか確認
            let bRun = 0;
            for (let dd = 1; dd <= DAYS; dd++) {
              if (schedule[nameB][dd] === YASUMI) {
                bRun++;
                if (bRun > MAX_OFF_STREAK) { ok = false; break; }
              } else {
                bRun = 0;
              }
            }
          }

          if (ok) {
            found = true;
            run = 0;
            break;
          } else {
            schedule[nameA][dayA] = YASUMI;
            schedule[nameB][dayA] = codeA;
            schedule[nameA][dayB] = codeB;
            schedule[nameB][dayB] = YASUMI;
          }
        }
        if (found) break;
      }
    }
  }

  // 夜勤×P(遅番)が両方若手にならないよう調整(可能な範囲で)
  function isJunior(name) {
    const s = staffData.find(s => s.name === name);
    return s && s.years <= JUNIOR_THRESHOLD;
  }

  for (let day = 1; day <= DAYS; day++) {
    const nightPerson = staffData.find(s => schedule[s.name][day] === '夜');
    const pPerson = staffData.find(s => schedule[s.name][day] === 'P');
    if (!nightPerson || !pPerson) continue;
    if (!isJunior(nightPerson.name) || !isJunior(pPerson.name)) continue;

    const candidates = staffData.filter(s =>
      s.name !== pPerson.name &&
      s.name !== nightPerson.name &&
      !isJunior(s.name) &&
      CORE_SHIFTS[schedule[s.name][day]]
    );

    if (candidates.length) {
      const other = candidates[Math.floor(Math.random() * candidates.length)];
      const tmp = schedule[other.name][day];
      schedule[other.name][day] = schedule[pPerson.name][day];
      schedule[pPerson.name][day] = tmp;
    }
  }

  // 最終チェック
  const finalWarnings = [];
  const juniorPairDays = [];
  for (let day = 1; day <= DAYS; day++) {
    const codesToday = staffData.map(s => schedule[s.name][day]);
    Object.keys(CORE_SHIFTS).forEach(code => {
      if (codesToday.filter(c => c === code).length < 1) {
        finalWarnings.push(`${day}日: ${code} が 0/1 人しかいません`);
      }
    });
    if (codesToday.filter(c => c === '夜').length < 1) {
      finalWarnings.push(`${day}日: 夜 が 0/1 人しかいません`);
    }

    const nightPerson = staffData.find(s => schedule[s.name][day] === '夜');
    const pPerson = staffData.find(s => schedule[s.name][day] === 'P');
    if (nightPerson && pPerson && isJunior(nightPerson.name) && isJunior(pPerson.name)) {
      juniorPairDays.push(day);
    }
  }
  if (juniorPairDays.length) {
    finalWarnings.push(`若手のみの組み合わせ(夜勤×P)になった日: ${juniorPairDays.join(', ')}日`);
  }

  return { schedule, warnings: finalWarnings, maxConsecutive };
}

function cellClass(code) {
  if (code === '夜') return 'cell-夜';
  if (code === AKE) return 'cell-明';
  if (code === YASUMI) return 'cell-休';
  if (code === '友A' || code === '友P') return 'cell-友';
  if (code === NICHI_SHIFT_CODE) return 'cell-日';
  return '';
}

function renderResult(schedule, warnings, maxConsecutive) {
  document.getElementById('result-wrap').style.display = 'block';

  const targetYear = parseInt(document.getElementById('target-year').value, 10);
  const targetMonth = parseInt(document.getElementById('target-month').value, 10);

  const warnDiv = document.getElementById('warnings');
  if (warnings.length) {
    warnDiv.innerHTML = `<div class="warning bad"><strong>未充足あり:</strong> ${warnings.slice(0,5).join(' / ')}${warnings.length > 5 ? ' 他' + (warnings.length - 5) + '件' : ''}</div>`;
  } else {
    warnDiv.innerHTML = `<div class="warning ok">必須シフトはすべて満たされています(最大${maxConsecutive}連勤以内)</div>`;
  }

  document.getElementById('result-title').textContent = `${targetYear}年${targetMonth}月 シフト表`;

  const table = document.getElementById('result-table');
  table.innerHTML = '';

  // 1行目: 日付
  const thead = document.createElement('tr');
  const thName = document.createElement('th');
  thName.textContent = '氏名';
  thName.className = 'name';
  thName.rowSpan = 2;
  thead.appendChild(thName);
  for (let d = 1; d <= DAYS; d++) {
    const th = document.createElement('th');
    th.textContent = d;
    const wd = getWeekday(targetYear, targetMonth, d);
    if (wd === 0) th.classList.add('cell-sun');
    if (wd === 6) th.classList.add('cell-sat');
    thead.appendChild(th);
  }
  table.appendChild(thead);

  // 2行目: 曜日
  const weekRow = document.createElement('tr');
  for (let d = 1; d <= DAYS; d++) {
    const th = document.createElement('th');
    const wd = getWeekday(targetYear, targetMonth, d);
    th.textContent = WEEKDAY_LABELS[wd];
    th.style.fontWeight = '400';
    th.style.fontSize = '11px';
    if (wd === 0) th.classList.add('cell-sun');
    if (wd === 6) th.classList.add('cell-sat');
    weekRow.appendChild(th);
  }
  table.appendChild(weekRow);

  staffData.forEach(s => {
    const tr = document.createElement('tr');
    const tdName = document.createElement('td');
    tdName.textContent = s.name;
    tdName.className = 'name';
    tr.appendChild(tdName);
    for (let d = 1; d <= DAYS; d++) {
      const td = document.createElement('td');
      const code = schedule[s.name][d];
      td.textContent = code;
      const cc = cellClass(code);
      if (cc) {
        td.className = cc;
      } else {
        const wd = getWeekday(targetYear, targetMonth, d);
        if (wd === 0) td.classList.add('cell-sun');
        if (wd === 6) td.classList.add('cell-sat');
      }
      tr.appendChild(td);
    }
    table.appendChild(tr);
  });

  const grid = document.getElementById('summary-grid');
  grid.innerHTML = '';

  // 全シフト種別(出現順)を集める
  const allCodes = [...Object.keys(CORE_SHIFTS), '夜', AKE, ...Object.keys(SUPPORT_SHIFTS), YASUMI];

  staffData.forEach(s => {
    const row = schedule[s.name];
    const counts = {};
    allCodes.forEach(c => { counts[c] = 0; });
    let maxRun = 0, run = 0;
    for (let d = 1; d <= DAYS; d++) {
      const code = row[d];
      if (counts[code] !== undefined) counts[code]++;
      if (isResting(code)) { run = 0; } else { run++; maxRun = Math.max(maxRun, run); }
    }

    const card = document.createElement('div');
    card.className = 'summary-card';

    const breakdown = allCodes
      .filter(c => counts[c] > 0)
      .map(c => `<span style="display:inline-block; margin:2px 6px 0 0;">${c} <strong>${counts[c]}</strong></span>`)
      .join('');

    card.innerHTML = `<div class="label">${s.name}</div><div class="sub" style="margin-top:4px;">${breakdown}</div><div class="sub" style="margin-top:4px;">最大連勤 ${maxRun}日</div>`;
    grid.appendChild(card);
  });
}

document.getElementById('generate-btn').addEventListener('click', () => {
  if (staffData.length === 0) return;
  const { schedule, warnings, maxConsecutive } = generateSchedule();
  lastSchedule = schedule;
  lastStaff = staffData.map(s => ({ ...s }));
  renderResult(schedule, warnings, maxConsecutive);
});

document.getElementById('export-btn').addEventListener('click', () => {
  if (!lastSchedule) {
    alert('先に「シフトを生成」を実行してください');
    return;
  }
  let csv = '氏名,' + Array.from({length: DAYS}, (_, i) => i + 1).join(',') + '\n';
  lastStaff.forEach(s => {
    const row = [s.name];
    for (let d = 1; d <= DAYS; d++) row.push(lastSchedule[s.name][d]);
    csv += row.join(',') + '\n';
  });
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const year = document.getElementById('target-year').value;
  const month = document.getElementById('target-month').value;
  a.download = `shift_${year}_${String(month).padStart(2,'0')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
});

renderStaffList();
</script>
</body>
</html>
