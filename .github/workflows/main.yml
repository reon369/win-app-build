name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsをセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 依存パッケージをインストール
        run: npm install

      - name: Windows用アプリをビルド
        run: npm run dist

      - name: ビルド結果をアップロード
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
